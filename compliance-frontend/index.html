<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComplianceIQ — Product Compliance Analyzer</title>
    <meta name="description" content="Pre-certification decision-support system that evaluates product formulations against regulatory standards and generates AI-powered risk assessments." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%230EA5E9' stroke-width='2'><path d='M9 12l2 2 4-4'/><circle cx='12' cy='12' r='10'/></svg>" />

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <style>
      .emerald-glow {
          box-shadow: 0 0 20px rgba(14, 168, 121, 0.4);
      }
      .process-line {
          background: linear-gradient(90deg, #0EA879 0%, rgba(14, 168, 121, 0.2) 100%);
      }
      .glow-primary {
          box-shadow: 0 0 15px rgba(14, 168, 121, 0.3);
      }
      .semi-circle-gauge {
          width: 200px;
          height: 100px;
          border-top-left-radius: 110px;
          border-top-right-radius: 110px;
          border: 20px solid #e2e8f0;
          border-bottom: 0;
          position: relative;
      }
      .gauge-fill {
          position: absolute;
          top: -20px;
          left: -20px;
          width: 200px;
          height: 100px;
          border-top-left-radius: 110px;
          border-top-right-radius: 110px;
          border: 20px solid #0EA879;
          border-bottom: 0;
          transform-origin: bottom center;
          transform: rotate(45deg);
      }
      .ai-glow {
          position: relative;
          background: rgba(255, 255, 255, 0.6);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(14, 168, 121, 0.3);
      }
      .ai-glow::after {
          content: '';
          position: absolute;
          inset: -2px;
          background: linear-gradient(45deg, #0EA879, #6ee7b7, #0EA879);
          z-index: -1;
          border-radius: 0.85rem;
          opacity: 0.5;
          filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
